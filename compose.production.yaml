name: tinggaljalan-prod

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "0.0.0.0:${APP_HTTP_PORT:-8180}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/prod-preview.conf:/etc/nginx/conf.d/default.conf:ro
      - ${DEPLOY_ROOT:-/home/monitor/apps/tinggaljalan}/shared/storage/app/public:/var/www/html/public/storage:ro
    depends_on:
      php-fpm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/up"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  php-fpm:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    env_file:
      - ${DEPLOY_ROOT:-/home/monitor/apps/tinggaljalan}/shared/.env.production
    environment:
      RUN_PREVIEW_MIGRATIONS: "false"
    volumes:
      - .:/var/www/html:ro
      - ${DEPLOY_ROOT:-/home/monitor/apps/tinggaljalan}/shared/storage:/var/www/html/storage
      - ${DEPLOY_ROOT:-/home/monitor/apps/tinggaljalan}/shared/bootstrap-cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - php
        - -r
        - '$$socket = @fsockopen("127.0.0.1", 9000); exit($$socket ? 0 : 1);'
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    env_file:
      - ${DEPLOY_ROOT:-/home/monitor/apps/tinggaljalan}/shared/.env.production
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

volumes:
  mysql-data:
    name: tinggaljalan-prod-mysql-data

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/prod-preview.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php-fpm:
        condition: service_started

  php-fpm:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: tinggaljalan
      DB_PASSWORD: password
      SESSION_DRIVER: file
      CACHE_STORE: file
      LOG_LEVEL: debug
      RUN_PREVIEW_MIGRATIONS: "true"
    volumes:
      - .:/var/www/html
      - ./.env.prod-preview:/var/www/html/.env
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: tinggaljalan
      MYSQL_USER: tinggaljalan
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-utinggaljalan", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 180s

volumes:
  mysql-data:
